services:
  - type: web
    name: bindu-jewellery-backend
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn bindu_jewellery_backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: bindu_jewellery_backend.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: bindu-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .render.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://bindu-jewellery-frontend.vercel.app # Placeholder, update after frontend deploy
      - key: CORS_ALLOWED_ORIGINS
        value: https://bindu-jewellery-frontend.vercel.app # Placeholder
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: INTEGRATION_ENCRYPTION_KEY
        sync: false
      - key: GLM_API_KEY
        sync: false
      - key: GLM_API_URL
        value: https://api.us-west-2.modal.direct/v1
      - key: GLM_MODEL
        value: zai-org/GLM-5.1-FP8
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

  - type: worker
    name: bindu-jewellery-worker
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: celery -A bindu_jewellery_backend worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: bindu_jewellery_backend.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: bindu-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bindu-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: bindu-jewellery-backend
          property: envVar:DJANGO_SECRET_KEY
      - key: GOOGLE_CLIENT_ID
        fromService:
          type: web
          name: bindu-jewellery-backend
          property: envVar:GOOGLE_CLIENT_ID
      - key: GOOGLE_CLIENT_SECRET
        fromService:
          type: web
          name: bindu-jewellery-backend
          property: envVar:GOOGLE_CLIENT_SECRET
      - key: META_APP_ID
        fromService:
          type: web
          name: bindu-jewellery-backend
          property: envVar:META_APP_ID
      - key: META_APP_SECRET
        fromService:
          type: web
          name: bindu-jewellery-backend
          property: envVar:META_APP_SECRET
      - key: INTEGRATION_ENCRYPTION_KEY
        fromService:
          type: web
          name: bindu-jewellery-backend
          property: envVar:INTEGRATION_ENCRYPTION_KEY
      - key: GLM_API_KEY
        fromService:
          type: web
          name: bindu-jewellery-backend
          property: envVar:GLM_API_KEY
      - key: GEMINI_API_KEY
        fromService:
          type: web
          name: bindu-jewellery-backend
          property: envVar:GEMINI_API_KEY

  - type: redis
    name: bindu-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

databases:
  - name: bindu-db
    plan: free
